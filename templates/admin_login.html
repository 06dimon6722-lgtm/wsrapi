{% extends "admin_base.html" %}
{% block content %}
  <h2>Вход в админку</h2>
  {% if error %}
    <p style="color: #c00;">{{ error }}</p>
  {% endif %}
  <form method="post">
    <div class="field">
      <label>Логин</label>
      <input type="text" name="username" required>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit">Войти</button>
  </form>
{% endblock %}
